services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dagos
      POSTGRES_USER: dagos
      POSTGRES_PASSWORD: dagos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagos"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py makemigrations accounts crm sales support hr finance reports &&
             python manage.py migrate &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DATABASE_URL: postgres://dagos:dagos@db:5432/dagos
      SECRET_KEY: dev-secret-change-me
      DEBUG: "1"
      ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100
    environment:
      DATABASE_URL: postgres://dagos:dagos@db:5432/dagos
    ports:
      - "8100:8100"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_AI_URL: http://localhost:8100
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
