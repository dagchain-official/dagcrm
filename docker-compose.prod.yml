# Production stack for a single server (DigitalOcean droplet).
# Caddy terminates HTTPS automatically and reverse-proxies to the services.
# Bring up with:  docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 4 --worker-class gthread --timeout 120"
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "0"
      ALLOWED_HOSTS: ${DOMAIN},www.${DOMAIN}
      CSRF_TRUSTED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      CORS_ALLOWED_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      FRONTEND_URL: https://${DOMAIN}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      # Twilio — click-to-call + WhatsApp (blank = manual mode, actions only logged)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
    volumes:
      - static:/app/staticfiles
      - media:/app/media
    depends_on:
      db:
        condition: service_healthy

  ai-service:
    build: ./ai-service
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100
    depends_on:
      db:
        condition: service_healthy

  # Builds the React app into the shared `frontend` volume, then exits.
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    volumes:
      - frontend:/out
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend:/srv/frontend:ro
      - static:/srv/static:ro
      - media:/srv/media:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
      ai-service:
        condition: service_started
      frontend:
        condition: service_completed_successfully

volumes:
  pgdata:
  static:
  media:
  frontend:
  caddy_data:
  caddy_config:
